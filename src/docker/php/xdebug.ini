[xdebug]
; ── Modo ───────────────────────────────────────────────────────────────────
; Para depuração interativa use: debug
; Para cobertura de testes use:  coverage
; Para ambos:                    debug,coverage
xdebug.mode                = debug

; ── Conexão com o IDE (VS Code / PHPStorm) ─────────────────────────────────
; "host.docker.internal" resolve automaticamente para o IP do host no Docker Desktop (WSL2)
xdebug.client_host         = host.docker.internal
xdebug.client_port         = 9003

; ── Disparo automático ─────────────────────────────────────────────────────
xdebug.start_with_request  = yes

; ── IDE Key ────────────────────────────────────────────────────────────────
xdebug.idekey              = VSCODE

; ── Limites ────────────────────────────────────────────────────────────────
xdebug.max_nesting_level   = 512

; ── Log (desabilitar em produção) ──────────────────────────────────────────
; 0 = sem log | 7 = log completo
xdebug.log_level           = 0
; xdebug.log                = /tmp/xdebug.log
