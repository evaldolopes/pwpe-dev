<VirtualHost *:80>
    ServerName  localhost
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks

        # Necessario para o roteamento do Laravel
        FallbackResource /index.php
    </Directory>

    # Logs
    ErrorLog  ${APACHE_LOG_DIR}/pwpe_error.log
    CustomLog ${APACHE_LOG_DIR}/pwpe_access.log combined
</VirtualHost>