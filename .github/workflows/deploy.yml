name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    
  workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Build
              run: echo Building the project

    deploy-development:
        runs-on: ubuntu-latest
        environment:
            name: development
            url: http://dev.portalwebpe.com.br
        needs: build
        steps:
            - name: Repo Checkout
              uses: actions/checkout@v2

            - name: Snyc files to Development Server
              uses: SamKirkland/FTP-Deploy-Action@4.0.0
              with:
                  server:  ${{ secrets.FTP_HOST }}
                  username: ${{ secrets.FT_USER }}
                  password: ${{ secrets.FTP_PASSWORD }}
                  port: 21
                  # source: "src/*"
                  server-dir: "/home2/pwpecombr/dev.portalwebpe.com.br/"
                  # rm: true 