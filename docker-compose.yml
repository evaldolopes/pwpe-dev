services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: pwpe-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pwpe
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - pwpe-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  # PHP-FPM Application
  app:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: pwpe-php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    networks:
      - pwpe-network
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: pwpe
      DB_USERNAME: root
      DB_PASSWORD: root
      XDEBUG_MODE: develop,debug
      XDEBUG_CONFIG: client_host=host.docker.internal client_port=9003

  # Nginx Web Server
  web:
    image: nginx:alpine
    container_name: pwpe-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - pwpe-network
    depends_on:
      - app
    extra_hosts:
      - "pwpe.local:127.0.0.1"

  # # Node/Vite for frontend
  # vite:
  #   image: node:20-alpine
  #   container_name: pwpe-vite
  #   working_dir: /var/www/html
  #   volumes:
  #     - ./src:/var/www/html
  #   ports:
  #     - "5174:5174"
  #   networks:
  #     - pwpe-network
  #   command: sh -c "npm install && npm run dev -- --host"
  #   depends_on:
  #     - app

networks:
  pwpe-network:
    driver: bridge

volumes:
  db_data:
    driver: local
